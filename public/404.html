<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Lex Konovalov — Lead Product Designer</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string
      // into just a query string, and then redirects the browser to the new url with
      // only the query string and hash fragment,
      // e.g. https://www.foo.tld/one/two?a=b#c -> https://www.foo.tld/?p=/one/two&q=a=b#c
      // Note: the 404.html file must be in the root directory.
      var pathSegmentsToKeep = 1; // "Portfolio-Website" segment

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
